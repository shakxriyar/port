<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --neon:#00f5d4;--neon2:#7b2ff7;--neon3:#f72585;
    --bg:#050510;--bg2:#0a0a1a;--bg3:#0f0f2a;
    --text:#e8e8ff;--muted:#6868a0;--card:#0d0d20;--border:#1a1a3a;
  }
  body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  ::selection{background:var(--neon);color:#000}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--neon);border-radius:2px}

  /* LOGIN */
  #loginScreen{
    position:fixed;inset:0;background:var(--bg);
    display:flex;align-items:center;justify-content:center;
    z-index:1000;
  }
  .login-box{
    background:var(--card);border:1px solid var(--border);
    border-radius:16px;padding:3rem;width:100%;max-width:420px;
    position:relative;overflow:hidden;
  }
  .login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--neon),var(--neon2),var(--neon3))}
  .login-icon{font-size:2.5rem;margin-bottom:1.5rem}
  .login-title{font-size:1.8rem;font-weight:800;margin-bottom:0.5rem}
  .login-sub{color:var(--muted);font-size:0.9rem;margin-bottom:2rem;font-family:'Space Mono',monospace}
  .login-label{font-size:0.75rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;font-family:'Space Mono',monospace;display:block;margin-bottom:6px}
  .login-input{
    width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);
    border-radius:6px;padding:14px 16px;color:var(--text);
    font-family:'Space Mono',monospace;font-size:1rem;outline:none;
    transition:border-color 0.3s;letter-spacing:0.1em;margin-bottom:1.5rem;
  }
  .login-input:focus{border-color:rgba(0,245,212,0.5)}
  .login-btn{
    width:100%;background:var(--neon);color:#000;border:none;
    padding:14px;border-radius:6px;font-size:1rem;font-weight:700;
    font-family:'Syne',sans-serif;cursor:pointer;letter-spacing:0.05em;
    transition:all 0.3s;
  }
  .login-btn:hover{background:#00c9b0;transform:translateY(-1px)}
  .login-error{color:var(--neon3);font-size:0.85rem;font-family:'Space Mono',monospace;margin-top:1rem;text-align:center;display:none}
  .login-shake{animation:shake 0.4s ease}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

  /* ADMIN LAYOUT */
  #adminPanel{display:none}
  .admin-header{
    background:rgba(5,5,16,0.95);border-bottom:1px solid var(--border);
    padding:1.2rem 2.5rem;display:flex;justify-content:space-between;align-items:center;
    position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);
  }
  .admin-logo{font-family:'Space Mono',monospace;font-size:0.9rem;color:var(--neon)}
  .admin-actions{display:flex;gap:1rem;align-items:center}
  .header-badge{
    display:inline-flex;align-items:center;gap:6px;
    background:rgba(0,245,212,0.08);border:1px solid rgba(0,245,212,0.2);
    border-radius:100px;padding:5px 14px;
    font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--neon);
  }
  .unread-badge{
    background:var(--neon3);color:#fff;
    border-radius:100px;padding:2px 8px;font-size:0.7rem;font-weight:700;
  }
  .btn-sm{
    padding:8px 16px;border-radius:4px;font-size:0.8rem;
    font-family:'Space Mono',monospace;cursor:pointer;transition:all 0.2s;border:none;
    letter-spacing:0.05em;
  }
  .btn-danger{background:rgba(247,37,133,0.1);color:var(--neon3);border:1px solid rgba(247,37,133,0.2)}
  .btn-danger:hover{background:rgba(247,37,133,0.2)}
  .btn-logout{background:transparent;color:var(--muted);border:1px solid var(--border)}
  .btn-logout:hover{color:var(--text);border-color:var(--text)}
  .btn-secondary{background:rgba(255,255,255,0.04);color:var(--text);border:1px solid var(--border)}
  .btn-secondary:hover{border-color:rgba(0,245,212,0.3);color:var(--neon)}

  /* STATS */
  .admin-body{padding:2.5rem;max-width:1400px;margin:0 auto}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2.5rem}
  .stat-card{
    background:var(--card);border:1px solid var(--border);
    border-radius:10px;padding:1.5rem;
  }
  .stat-card-label{font-size:0.75rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;font-family:'Space Mono',monospace;margin-bottom:8px}
  .stat-card-num{font-size:2rem;font-weight:800;font-family:'Space Mono',monospace}
  .stat-card-num.green{color:var(--neon)}
  .stat-card-num.purple{color:#9d6ef7}
  .stat-card-num.pink{color:var(--neon3)}
  .stat-card-sub{font-size:0.78rem;color:var(--muted);margin-top:4px}

  /* FILTERS */
  .filters{display:flex;gap:0.75rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
  .filter-btn{
    padding:7px 18px;border-radius:100px;
    font-size:0.78rem;font-family:'Space Mono',monospace;
    cursor:pointer;transition:all 0.2s;border:1px solid var(--border);
    background:transparent;color:var(--muted);
  }
  .filter-btn.active{background:rgba(0,245,212,0.1);border-color:rgba(0,245,212,0.3);color:var(--neon)}
  .search-input{
    margin-left:auto;background:var(--card);border:1px solid var(--border);
    border-radius:6px;padding:8px 14px;color:var(--text);
    font-family:'Space Mono',monospace;font-size:0.8rem;outline:none;
    transition:border-color 0.3s;width:220px;
  }
  .search-input:focus{border-color:rgba(0,245,212,0.4)}
  .search-input::placeholder{color:var(--muted)}

  /* MESSAGES */
  .messages-list{display:flex;flex-direction:column;gap:1rem}
  .msg-card{
    background:var(--card);border:1px solid var(--border);
    border-radius:12px;overflow:hidden;transition:all 0.2s;
    cursor:pointer;
  }
  .msg-card:hover{border-color:rgba(0,245,212,0.2)}
  .msg-card.unread{border-left:3px solid var(--neon)}
  .msg-card.unread .msg-header{background:rgba(0,245,212,0.03)}
  .msg-header{
    padding:1.2rem 1.5rem;display:flex;align-items:center;
    gap:1rem;justify-content:space-between;
  }
  .msg-header-left{display:flex;align-items:center;gap:1rem;flex:1;min-width:0}
  .msg-avatar{
    width:40px;height:40px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:0.9rem;font-family:'Space Mono',monospace;
  }
  .msg-info{flex:1;min-width:0}
  .msg-name{font-size:0.95rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .msg-meta{font-family:'Space Mono',monospace;font-size:0.72rem;color:var(--muted);margin-top:2px}
  .msg-subject{font-size:0.85rem;color:var(--muted);flex:2;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .msg-header-right{display:flex;align-items:center;gap:0.75rem;flex-shrink:0}
  .msg-date{font-family:'Space Mono',monospace;font-size:0.72rem;color:var(--muted)}
  .msg-unread-dot{width:8px;height:8px;border-radius:50%;background:var(--neon);flex-shrink:0}
  .msg-body{
    padding:0 1.5rem;max-height:0;overflow:hidden;
    transition:max-height 0.3s ease, padding 0.3s ease;
  }
  .msg-body.open{max-height:500px;padding:1.2rem 1.5rem}
  .msg-body-content{
    background:rgba(255,255,255,0.02);border:1px solid var(--border);
    border-radius:8px;padding:1.2rem;margin-bottom:1rem;
  }
  .msg-field{display:grid;grid-template-columns:100px 1fr;gap:8px;margin-bottom:8px;font-size:0.88rem}
  .msg-field:last-child{margin-bottom:0}
  .msg-field-label{color:var(--muted);font-family:'Space Mono',monospace;font-size:0.75rem;padding-top:2px}
  .msg-field-val{color:var(--text);line-height:1.6;word-break:break-word}
  .msg-actions{display:flex;gap:0.75rem;padding-bottom:1rem}
  .btn-read{padding:7px 16px;border-radius:4px;font-size:0.78rem;font-family:'Space Mono',monospace;cursor:pointer;transition:all 0.2s;background:rgba(0,245,212,0.08);border:1px solid rgba(0,245,212,0.2);color:var(--neon)}
  .btn-read:hover{background:rgba(0,245,212,0.15)}
  .btn-delete{padding:7px 16px;border-radius:4px;font-size:0.78rem;font-family:'Space Mono',monospace;cursor:pointer;transition:all 0.2s;background:rgba(247,37,133,0.06);border:1px solid rgba(247,37,133,0.2);color:var(--neon3)}
  .btn-delete:hover{background:rgba(247,37,133,0.15)}

  /* EMPTY */
  .empty-state{text-align:center;padding:5rem 2rem}
  .empty-icon{font-size:3rem;margin-bottom:1rem;opacity:0.3}
  .empty-text{color:var(--muted);font-family:'Space Mono',monospace;font-size:0.9rem}

  /* TOAST */
  .toast{position:fixed;bottom:2rem;right:2rem;z-index:9999;padding:1rem 1.5rem;border-radius:8px;font-size:0.9rem;font-weight:600;display:none}
  .toast.success{background:#00f5d4;color:#000;display:flex;gap:8px;align-items:center}
  .toast.error{background:#f72585;color:#fff;display:flex;gap:8px;align-items:center}

  @media(max-width:768px){
    .admin-header{padding:1rem 1.5rem}
    .admin-body{padding:1.5rem}
    .msg-subject{display:none}
    .search-input{width:100%}
    .filters{gap:0.5rem}
  }
</style>
</head>
<body>

<!-- SOZLASH — portfolio.html dagi CONFIG bilan bir xil bo'lishi kerak -->
<script>
  const CONFIG = {
    BOT_TOKEN: "8355674438:AAHeX0scFb1aaLplYxUE3cUSeCTh8VB_PUc",
    CHAT_ID: "6457425447",
    ADMIN_PASSWORD: "0777",   // ← Parolingiz shu yerda
    OWNER_NAME: "shahriyor",
  };
  const MESSAGES_KEY = "portfolio_messages";
</script>

<div id="toast" class="toast"></div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box" id="loginBox">
    <div class="login-icon">🔐</div>
    <h1 class="login-title">Admin Panel</h1>
    <p class="login-sub">// faqat siz kirishingiz mumkin</p>
    <label class="login-label">Parol</label>
    <input type="password" class="login-input" id="passwordInput" placeholder="••••••••" autocomplete="current-password">
    <button class="login-btn" onclick="checkLogin()">Kirish →</button>
    <p class="login-error" id="loginError">✗ Noto'g'ri parol!</p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <div class="admin-header">
    <div class="admin-logo">
      // admin.panel &nbsp;
      <span class="header-badge">
        <span id="unreadCount">0</span> yangi
      </span>
    </div>
    <div class="admin-actions">
      <button class="btn-sm btn-secondary" onclick="refreshMessages()">↻ Yangilash</button>
      <button class="btn-sm btn-danger" onclick="clearAllMessages()">✕ Barchasini o'chirish</button>
      <button class="btn-sm btn-logout" onclick="logout()">Chiqish</button>
    </div>
  </div>

  <div class="admin-body">
    <!-- STATS -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-card-label">Jami xabarlar</div>
        <div class="stat-card-num green" id="statTotal">0</div>
        <div class="stat-card-sub">Hammasi</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">O'qilmagan</div>
        <div class="stat-card-num purple" id="statUnread">0</div>
        <div class="stat-card-sub">Yangi</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">O'qilgan</div>
        <div class="stat-card-num" id="statRead">0</div>
        <div class="stat-card-sub">Ko'rilgan</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Bugun</div>
        <div class="stat-card-num pink" id="statToday">0</div>
        <div class="stat-card-sub">Yangi bugun</div>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">Barchasi</button>
      <button class="filter-btn" onclick="setFilter('unread', this)">O'qilmagan</button>
      <button class="filter-btn" onclick="setFilter('read', this)">O'qilgan</button>
      <input type="text" class="search-input" id="searchInput" placeholder="Qidirish..." oninput="renderMessages()">
    </div>

    <!-- MESSAGES -->
    <div class="messages-list" id="messagesList"></div>
  </div>
</div>

<script>
  let currentFilter = 'all';
  let openCard = null;

  const AVATAR_COLORS = [
    {bg:'rgba(0,245,212,0.12)',color:'#00f5d4'},
    {bg:'rgba(123,47,247,0.12)',color:'#9d6ef7'},
    {bg:'rgba(247,37,133,0.12)',color:'#f72585'},
    {bg:'rgba(0,180,255,0.12)',color:'#00b4ff'},
    {bg:'rgba(255,180,0,0.12)',color:'#ffb400'},
  ];

  function getMessages() {
    return JSON.parse(localStorage.getItem(MESSAGES_KEY) || '[]');
  }

  function saveMessages(msgs) {
    localStorage.setItem(MESSAGES_KEY, JSON.stringify(msgs));
  }

  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = (type==='success'?'✓ ':'✗ ') + msg;
    t.className = `toast ${type}`;
    t.style.display = 'flex';
    setTimeout(() => t.style.display='none', 3500);
  }

  function checkLogin() {
    const val = document.getElementById('passwordInput').value;
    if (val === CONFIG.ADMIN_PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      renderMessages();
    } else {
      const box = document.getElementById('loginBox');
      box.classList.add('login-shake');
      setTimeout(() => box.classList.remove('login-shake'), 400);
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('passwordInput').value = '';
      setTimeout(() => document.getElementById('loginError').style.display='none', 3000);
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('passwordInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') checkLogin();
    });
  });

  function logout() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('passwordInput').value = '';
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMessages();
  }

  function formatDate(iso) {
    const d = new Date(iso);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return 'Hozir';
    if (diff < 3600000) return Math.floor(diff/60000) + ' daq. oldin';
    if (diff < 86400000) return Math.floor(diff/3600000) + ' soat oldin';
    return d.toLocaleDateString('uz-UZ', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  }

  function getInitials(name) {
    return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  }

  function getColor(name) {
    let h = 0;
    for(let c of name) h = (h + c.charCodeAt(0)) % AVATAR_COLORS.length;
    return AVATAR_COLORS[h];
  }

  function renderMessages() {
    let msgs = getMessages();
    const search = document.getElementById('searchInput')?.value?.toLowerCase() || '';

    // Stats
    const today = new Date().toDateString();
    document.getElementById('statTotal').textContent = msgs.length;
    document.getElementById('statUnread').textContent = msgs.filter(m=>!m.read).length;
    document.getElementById('statRead').textContent = msgs.filter(m=>m.read).length;
    document.getElementById('statToday').textContent = msgs.filter(m=>new Date(m.date).toDateString()===today).length;
    document.getElementById('unreadCount').textContent = msgs.filter(m=>!m.read).length;

    // Filter
    if (currentFilter === 'unread') msgs = msgs.filter(m=>!m.read);
    if (currentFilter === 'read') msgs = msgs.filter(m=>m.read);
    if (search) msgs = msgs.filter(m =>
      m.name.toLowerCase().includes(search) ||
      m.email.toLowerCase().includes(search) ||
      m.subject.toLowerCase().includes(search) ||
      m.message.toLowerCase().includes(search)
    );

    const list = document.getElementById('messagesList');
    if (msgs.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">Hech qanday xabar yo'q</div></div>`;
      return;
    }

    list.innerHTML = msgs.map(msg => {
      const col = getColor(msg.name);
      const init = getInitials(msg.name);
      return `
        <div class="msg-card ${msg.read?'':'unread'}" id="msg-${msg.id}">
          <div class="msg-header" onclick="toggleMsg(${msg.id})">
            <div class="msg-header-left">
              <div class="msg-avatar" style="background:${col.bg};color:${col.color}">${init}</div>
              <div class="msg-info">
                <div class="msg-name">${escHtml(msg.name)}</div>
                <div class="msg-meta">${escHtml(msg.email)} ${msg.phone && msg.phone!=='Kiritilmagan'?'· '+escHtml(msg.phone):''}</div>
              </div>
            </div>
            <div class="msg-subject">${escHtml(msg.subject)}</div>
            <div class="msg-header-right">
              <div class="msg-date">${formatDate(msg.date)}</div>
              ${!msg.read?'<div class="msg-unread-dot"></div>':''}
            </div>
          </div>
          <div class="msg-body" id="body-${msg.id}">
            <div class="msg-body-content">
              <div class="msg-field"><span class="msg-field-label">Ism</span><span class="msg-field-val">${escHtml(msg.name)}</span></div>
              <div class="msg-field"><span class="msg-field-label">Email</span><span class="msg-field-val" style="color:var(--neon)">${escHtml(msg.email)}</span></div>
              <div class="msg-field"><span class="msg-field-label">Telefon</span><span class="msg-field-val">${escHtml(msg.phone||'—')}</span></div>
              <div class="msg-field"><span class="msg-field-label">Mavzu</span><span class="msg-field-val" style="font-weight:600">${escHtml(msg.subject)}</span></div>
              <div class="msg-field"><span class="msg-field-label">Xabar</span><span class="msg-field-val" style="white-space:pre-wrap">${escHtml(msg.message)}</span></div>
              <div class="msg-field"><span class="msg-field-label">Vaqt</span><span class="msg-field-val" style="color:var(--muted);font-family:'Space Mono',monospace;font-size:0.8rem">${new Date(msg.date).toLocaleString('uz-UZ')}</span></div>
            </div>
            <div class="msg-actions">
              ${!msg.read?`<button class="btn-read" onclick="markRead(${msg.id},event)">✓ O'qilgan deb belgilash</button>`:`<button class="btn-read" style="opacity:0.5" onclick="markUnread(${msg.id},event)">↩ O'qilmagan</button>`}
              <button class="btn-delete" onclick="deleteMsg(${msg.id},event)">✕ O'chirish</button>
              <button class="btn-sm btn-secondary" onclick="replyTelegram('${escHtml(msg.name)}','${escHtml(msg.email)}',event)" style="margin-left:auto;font-family:'Space Mono',monospace;font-size:0.75rem">✈ Telegram orqali javob</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function toggleMsg(id) {
    const body = document.getElementById(`body-${id}`);
    const isOpen = body.classList.contains('open');
    if (openCard && openCard !== id) {
      document.getElementById(`body-${openCard}`)?.classList.remove('open');
    }
    body.classList.toggle('open', !isOpen);
    openCard = isOpen ? null : id;
    if (!isOpen) markRead(id, null, false);
  }

  function markRead(id, e, rerender=true) {
    if (e) e.stopPropagation();
    const msgs = getMessages();
    const m = msgs.find(x=>x.id===id);
    if (m) { m.read = true; saveMessages(msgs); }
    if (rerender) { renderMessages(); showToast("O'qilgan deb belgilandi"); }
  }

  function markUnread(id, e) {
    if (e) e.stopPropagation();
    const msgs = getMessages();
    const m = msgs.find(x=>x.id===id);
    if (m) { m.read = false; saveMessages(msgs); }
    renderMessages();
  }

  function deleteMsg(id, e) {
    if (e) e.stopPropagation();
    if (!confirm("Bu xabarni o'chirmoqchimisiz?")) return;
    const msgs = getMessages().filter(x=>x.id!==id);
    saveMessages(msgs);
    renderMessages();
    showToast("Xabar o'chirildi");
  }

  function clearAllMessages() {
    if (!confirm("Barcha xabarlarni o'chirmoqchimisiz? Bu amalni bekor qilib bo'lmaydi!")) return;
    localStorage.removeItem(MESSAGES_KEY);
    renderMessages();
    showToast("Barcha xabarlar o'chirildi");
  }

  function refreshMessages() {
    renderMessages();
    showToast("Yangilandi ✓");
  }

  function replyTelegram(name, email, e) {
    if (e) e.stopPropagation();
    const msg = encodeURIComponent(`Salom ${name}!\n\nPortfolioingizdan xabaringizni ko'rdim.\n\n`);
    // Telegram deep link ochish
    showToast(`${name} ga javob: email: ${email}`);
  }

  // Sahifa yopilganda yoki boshqa tab ochilganda ham yangilansin
  window.addEventListener('focus', () => {
    if (document.getElementById('adminPanel').style.display !== 'none') {
      renderMessages();
    }
  });
</script>
