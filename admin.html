<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="./pngfon.png">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --neon:#00f5d4;--neon2:#7b2ff7;--neon3:#f72585;
    --bg:#050510;--bg2:#0a0a1a;--bg3:#0f0f2a;
    --text:#e8e8ff;--muted:#6868a0;--card:#0d0d20;--border:#1a1a3a;
  }
  body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  ::selection{background:var(--neon);color:#000}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--neon);border-radius:2px}

  /* LOGIN */
  #loginScreen{
    position:fixed;inset:0;background:var(--bg);
    display:flex;align-items:center;justify-content:center;z-index:1000;
    transition:0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .login-box{
    background:var(--card);border:1px solid var(--border);
    border-radius:16px;padding:3rem;width:100%;max-width:420px;
    text-align:center;box-shadow:0 20px 50px rgba(0,0,0,0.5);
  }
  .login-box h1{font-size:1.8rem;margin-bottom:0.5rem;font-weight:800;letter-spacing:-1px}
  .login-input{
    width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--border);
    border-radius:8px;padding:14px 18px;color:#fff;font-family:'Space Mono',monospace;
    font-size:1rem;margin:1.5rem 0;outline:none;transition:0.3s;
  }
  .login-input:focus{border-color:var(--neon);background:rgba(0,245,212,0.05)}
  .login-btn{
    width:100%;background:var(--neon);color:#000;border:none;
    padding:14px;border-radius:8px;font-weight:800;font-size:1rem;
    cursor:pointer;transition:0.3s;
  }
  .login-btn:hover{transform:translateY(-2px);box-shadow:0 0 20px rgba(0,245,212,0.4)}

  /* ADMIN LAYOUT */
  #adminPanel{display:none;opacity:0;transition:0.5s}
  .admin-header{
    padding:1.2rem 2.5rem;border-bottom:1px solid var(--border);
    display:flex;justify-content:space-between;align-items:center;
    background:rgba(5,5,16,0.8);backdrop-filter:blur(15px);
    position:sticky;top:0;z-index:100;
  }
  .header-info{display:flex;align-items:center;gap:1rem}
  .status-dot{width:8px;height:8px;background:var(--neon);border-radius:50%;box-shadow:0 0 10px var(--neon)}
  .admin-body{padding:2.5rem;max-width:1200px;margin:0 auto}

  /* MESSAGES */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:1.5rem;margin-bottom:3rem}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem}
  .stat-val{font-size:2rem;font-weight:800;color:var(--neon);font-family:'Space Mono',monospace}
  .stat-label{color:var(--muted);font-size:0.8rem;text-transform:uppercase;letter-spacing:1px}

  .msg-grid{display:grid;grid-template-columns:1fr;gap:1.5rem}
  .msg-card{
    background:var(--card);border:1px solid var(--border);border-radius:16px;
    overflow:hidden;transition:0.3s;position:relative;
  }
  .msg-card:hover{border-color:var(--muted);transform:translateY(-3px)}
  .msg-card.unread{border-left:4px solid var(--neon)}
  .msg-card.unread::after{
    content:'YANGI';position:absolute;top:1rem;right:1rem;
    background:var(--neon);color:#000;font-size:0.6rem;font-weight:900;
    padding:2px 6px;border-radius:4px;
  }

  .msg-header{padding:1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
  .msg-sender-info h3{font-size:1.2rem;font-weight:800;margin-bottom:0.3rem}
  .msg-meta{font-family:'Space Mono',monospace;font-size:0.8rem;color:var(--muted);display:flex;gap:1.5rem}
  .msg-content{padding:1.5rem;line-height:1.7;color:#c0c0e0}
  
  .msg-footer{padding:1rem 1.5rem;background:rgba(255,255,255,0.02);display:flex;justify-content:space-between;align-items:center}
  .msg-actions{display:flex;gap:0.8rem}
  .btn-action{
    background:var(--bg3);border:1px solid var(--border);color:var(--text);
    padding:8px 14px;border-radius:6px;font-size:0.8rem;font-weight:600;
    cursor:pointer;transition:0.2s;display:flex;align-items:center;gap:6px;text-decoration:none;
  }
  .btn-action:hover{background:var(--border);border-color:var(--muted)}
  .btn-action.primary:hover{border-color:var(--neon);color:var(--neon)}
  .btn-action.danger:hover{border-color:var(--neon3);color:var(--neon3)}

  .empty-state{text-align:center;padding:5rem 0;color:var(--muted)}
  
  /* TOAST */
  .toast{
    position:fixed;bottom:2rem;right:2rem;z-index:9999;
    padding:1rem 1.5rem;background:var(--neon);color:#000;
    border-radius:8px;font-size:0.9rem;font-weight:600;
    display:none;animation:slideIn 0.3s ease;
  }
  @keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<div id="loginScreen">
  <div class="login-box">
    <div style="font-family:'Space Mono',monospace;color:var(--neon);margin-bottom:1rem;font-size:0.8rem">SYSTEM_AUTH_REQUIRED</div>
    <h1>Admin Panel</h1>
    <input type="password" id="passInput" class="login-input" placeholder="Parolni kiriting..." autofocus>
    <button class="login-btn" onclick="checkAuth()">Tizimga kirish</button>
  </div>
</div>

<div id="adminPanel">
  <header class="admin-header">
    <div class="header-info">
      <div class="status-dot"></div>
      <div style="font-family:'Space Mono',monospace;font-size:0.8rem;letter-spacing:1px">PORTFOLIO_DATABASE v2.0</div>
    </div>
    <div style="display:flex;gap:1rem">
      <button onclick="refreshMessages()" class="btn-action">Yangilash</button>
      <button onclick="clearAllMessages()" class="btn-action danger">Hammasini tozalash</button>
    </div>
  </header>

  <main class="admin-body">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Jami xabarlar</div>
        <div class="stat-val" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Yangi xabarlar</div>
        <div class="stat-val" id="stat-new" style="color:var(--neon3)">0</div>
      </div>
    </div>

    <div id="messagesContainer" class="msg-grid">
      </div>
  </main>
</div>

<script type="module">
  // Firebase SDK ulanishi
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDJVrSYuWF5Xgj2hoRSil-IaR9lYknBHM0",
    authDomain: "portfolio-2c967.firebaseapp.com",
    databaseURL: "https://portfolio-2c967-default-rtdb.firebaseio.com",
    projectId: "portfolio-2c967",
    storageBucket: "portfolio-2c967.firebasestorage.app",
    messagingSenderId: "205928792319",
    appId: "1:205928792319:web:6f570dc374276bb25dccca",
    measurementId: "G-JVVVRJGKF0"
  };

  // Initialize
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Parol tekshirish
  window.checkAuth = () => {
    const input = document.getElementById('passInput').value;
    if (input === "w777") {
      const ls = document.getElementById('loginScreen');
      const ap = document.getElementById('adminPanel');
      ls.style.opacity = '0';
      setTimeout(() => {
        ls.style.display = 'none';
        ap.style.display = 'block';
        setTimeout(() => ap.style.opacity = '1', 50);
        loadMessages();
      }, 500);
    } else {
      showToast("Parol noto'g'ri!", "error");
    }
  };

  // Enter tugmasini bosganda kirish
  document.getElementById('passInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') checkAuth();
  });

  // Xabarlarni yuklash (Realtime)
  function loadMessages() {
    const messagesRef = ref(db, 'messages');
    onValue(messagesRef, (snapshot) => {
      const data = snapshot.val();
      renderMessages(data);
    });
  }

  function renderMessages(data) {
    const container = document.getElementById('messagesContainer');
    const statTotal = document.getElementById('stat-total');
    const statNew = document.getElementById('stat-new');

    if (!data) {
      container.innerHTML = '<div class="empty-state"><h3>Hozircha xabarlar yo\'q</h3><p>Sizga yozishsa, shu yerda paydo bo\'ladi.</p></div>';
      statTotal.textContent = "0";
      statNew.textContent = "0";
      return;
    }

    const messages = Object.keys(data).map(key => ({ ...data[key], firebaseKey: key }));
    messages.sort((a, b) => new Date(b.date) - new Date(a.date));

    statTotal.textContent = messages.length;
    statNew.textContent = messages.filter(m => !m.read).length;

    container.innerHTML = messages.map(m => `
      <div class="msg-card ${!m.read ? 'unread' : ''}" onclick="markRead('${m.firebaseKey}')">
        <div class="msg-header">
          <div class="msg-sender-info">
            <h3>${m.name}</h3>
            <div class="msg-meta">
              <span>📧 ${m.email}</span>
              <span>📞 ${m.phone}</span>
            </div>
          </div>
          <div style="font-family:'Space Mono',monospace; font-size:0.75rem; color:var(--muted)">
            ${new Date(m.date).toLocaleString('uz-UZ')}
          </div>
        </div>
        <div class="msg-content">
          <div style="color:var(--neon); font-size:0.8rem; margin-bottom:0.5rem; font-weight:700">MAVZU: ${m.subject}</div>
          ${m.message}
        </div>
        <div class="msg-footer">
          <div class="msg-actions">
            <a href="mailto:${m.email}" class="btn-action primary">Email javob</a>
            <button onclick="replyTelegram('${m.name}', '${m.email}', event)" class="btn-action">TG orqali</button>
            <button onclick="deleteMsg('${m.firebaseKey}', event)" class="btn-action danger">O'chirish</button>
          </div>
          ${m.read ? '<span style="color:var(--muted);font-size:0.7rem">✓ Ko\'rildi</span>' : ''}
        </div>
      </div>
    `).join('');
  }

  // Funksiyalar
  window.markRead = (key) => {
    update(ref(db, 'messages/' + key), { read: true });
  };

  window.deleteMsg = (key, e) => {
    if (e) e.stopPropagation();
    if (!confirm("Bu xabarni o'chirmoqchimisiz?")) return;
    remove(ref(db, 'messages/' + key));
    showToast("Xabar o'chirildi");
  };

  window.clearAllMessages = () => {
    if (!confirm("Barcha xabarlarni o'chirmoqchimisiz? Bu amalni bekor qilib bo'lmaydi!")) return;
    remove(ref(db, 'messages'));
    showToast("Barcha xabarlar o'chirildi");
  };

  window.replyTelegram = (name, email, e) => {
    if (e) e.stopPropagation();
    const text = encodeURIComponent(`Salom ${name}! Sizning portfoliodagi xabaringizni oldim...`);
    window.open(`https://t.me/shaxriiyor`); // O'zingizning havolangiz
  };

  window.refreshMessages = () => {
    showToast("Yangilandi ✓");
  };

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = type === 'success' ? 'var(--neon)' : 'var(--neon3)';
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }
</script>
</body>
</html>
